# SignSpeak runtime + training configuration.
# Every tunable lives here (RULES R-6) — no magic constants in code.

capture:
  device: 0
  width: 640
  height: 480

hands:
  max_num_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5

debounce:
  confidence_threshold: 0.75
  stable_frames: 15
  # Candidate-confirm mode (PRD F-6): a stable sign becomes a pending candidate
  # the signer confirms (ENTER) or rejects ('x') before it joins the sentence.
  require_confirm: true

tts:
  backend: auto  # auto | online (edge-tts Indian voices) | offline (pyttsx3)
  voice: en-IN-NeerjaNeural  # online voice; hi-IN-SwaraNeural for Hindi

training:
  seed: 42
  test_size: 0.2
  n_estimators: 200
  min_samples_per_sign: 30

paths:
  data_file: data/isl_static.csv
  model_file: models/static_classifier.joblib
